---
jobs:
  build:
    continue-on-error: true
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Set artifact base name
        run: |
          echo "ASSET_BASE=smt-${{ matrix.target }}" >> "$GITHUB_ENV"
          if [[ "${{ matrix.target }}" == *"-windows-"* ]]; then
            echo "BIN_NAME=smt.exe" >> "$GITHUB_ENV"
            echo "ASSET_FILE=smt-${{ matrix.target }}.exe" >> "$GITHUB_ENV"
          else
            echo "BIN_NAME=smt" >> "$GITHUB_ENV"
            echo "ASSET_FILE=smt-${{ matrix.target }}" >> "$GITHUB_ENV"
          fi
      - if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        name: Install Cross (for non-native targets)
        run: cargo install cross --git https://github.com/cross-rs/cross
      - if: matrix.target == 'x86_64-unknown-linux-gnu' || startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'windows')
        name: Build Release Binary (native)
        run: cargo build --release --target ${{ matrix.target }}
      - if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        name: Build Release Binary (cross)
        run: cross build --release --target ${{ matrix.target }}
      - name: Prepare Artifacts
        run: |
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "artifacts/${ASSET_FILE}"
          if [[ "${BIN_NAME}" != *.exe ]]; then
            chmod +x "artifacts/${ASSET_FILE}"
          fi
        shell: bash
      - name: Create Binary Checksum
        run: |
          cd artifacts
          if [[ "${BIN_NAME}" == *.exe ]]; then
            certUtil -hashfile "${ASSET_FILE}" SHA256 | grep -v "SHA256 hash" | tr -d ' ' > "${ASSET_FILE}.sha256"
          else
            sha256sum "${ASSET_FILE}" > "${ASSET_FILE}.sha256"
          fi
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_BASE }}
          path: artifacts/
    strategy:
      matrix:
        include:
          # Linux x86_64 (Tier 1)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux i686 (Tier 1)
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
          # Linux ARM64 (Tier 2)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # Linux x86_64 musl (Tier 2)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          # Linux ARM64 musl (Tier 2)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          # macOS x86_64 (Tier 1)
          - os: macos-latest
            target: x86_64-apple-darwin
          # macOS ARM64 (Tier 1)
          - os: macos-latest
            target: aarch64-apple-darwin
          # Windows x86_64 (Tier 1)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # Windows i686 (Tier 1)
          - os: windows-latest
            target: i686-pc-windows-msvc
          # Windows ARM64 (Tier 2)
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          # Windows x86_64 GNU (Tier 1)
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
          # Windows i686 GNU (Tier 2 w/ host tools)
          - os: ubuntu-latest
            target: i686-pc-windows-gnu
          # Windows x86_64 gnullvm (Tier 2 w/ host tools)
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnullvm
          # FreeBSD x86_64 (Tier 2)
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
          # ---- Additional cross-rs supported targets (std-enabled) ----
          # Linux (x86 variants)
          - os: ubuntu-latest
            target: i586-unknown-linux-gnu
          - os: ubuntu-latest
            target: i586-unknown-linux-musl
          - os: ubuntu-latest
            target: i686-unknown-linux-musl
          # Linux (ARM / AArch64)
          - os: ubuntu-latest
            target: aarch64_be-unknown-linux-gnu
          - os: ubuntu-latest
            target: arm-unknown-linux-gnueabi
          - os: ubuntu-latest
            target: arm-unknown-linux-gnueabihf
          - os: ubuntu-latest
            target: arm-unknown-linux-musleabi
          - os: ubuntu-latest
            target: arm-unknown-linux-musleabihf
          - os: ubuntu-latest
            target: armv5te-unknown-linux-gnueabi
          - os: ubuntu-latest
            target: armv5te-unknown-linux-musleabi
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabi
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabi
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
          - os: ubuntu-latest
            target: thumbv7neon-unknown-linux-gnueabihf
          # Linux (LoongArch)
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-musl
          # Linux (MIPS)
          - os: ubuntu-latest
            target: mips-unknown-linux-gnu
          - os: ubuntu-latest
            target: mipsel-unknown-linux-gnu
          - os: ubuntu-latest
            target: mips64-unknown-linux-gnuabi64
          - os: ubuntu-latest
            target: mips64el-unknown-linux-gnuabi64
          # Linux (PowerPC)
          - os: ubuntu-latest
            target: powerpc-unknown-linux-gnu
          - os: ubuntu-latest
            target: powerpc64-unknown-linux-gnu
          - os: ubuntu-latest
            target: powerpc64le-unknown-linux-gnu
          # Linux (RISC-V / S390x / SPARC)
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-musl
          - os: ubuntu-latest
            target: s390x-unknown-linux-gnu
          - os: ubuntu-latest
            target: sparc64-unknown-linux-gnu
          # BSDs / illumos / Solaris (cross std targets)
          - os: ubuntu-latest
            target: i686-unknown-freebsd
          - os: ubuntu-latest
            target: aarch64-unknown-freebsd
          - os: ubuntu-latest
            target: x86_64-unknown-netbsd
          - os: ubuntu-latest
            target: x86_64-unknown-illumos
          - os: ubuntu-latest
            target: sparcv9-sun-solaris
          - os: ubuntu-latest
            target: x86_64-pc-solaris
          - os: ubuntu-latest
            target: x86_64-unknown-dragonfly
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download All Artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: release-artifacts
      - name: Check for Required Builds
        run: |
          # Verify at least one x86_64 build per OS succeeded
          LINUX_X86_64=$(find release-artifacts -name "smt-x86_64-unknown-linux-gnu*" -type f 2>/dev/null | wc -l)
          MACOS_X86_64=$(find release-artifacts -name "smt-x86_64-apple-darwin*" -type f 2>/dev/null | wc -l)
          WINDOWS_X86_64=$(find release-artifacts -name "smt-x86_64-pc-windows-msvc*" -type f 2>/dev/null | wc -l)
          echo "Linux x86_64 artifacts: $LINUX_X86_64"
          echo "macOS x86_64 artifacts: $MACOS_X86_64"
          echo "Windows x86_64 artifacts: $WINDOWS_X86_64"
          if [ "$LINUX_X86_64" -eq 0 ] || [ "$MACOS_X86_64" -eq 0 ] || [ "$WINDOWS_X86_64" -eq 0 ]; then
            echo "ERROR: Missing required x86_64 builds!"
            exit 1
          fi
        shell: bash
      - name: Flatten Artifacts Directory
        run: |
          mkdir -p flat-artifacts
          find release-artifacts -type f -exec cp {} flat-artifacts/ \;
          ls -lah flat-artifacts/
        shell: bash
      - id: changelog
        name: Get Changelog Entry
        run: |
          # Extract changelog for this version from CHANGELOG.md
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ -f "CHANGELOG.md" ]; then
            # Get content between this version and next version header
            awk "/^## \[${VERSION}\]/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md > changelog_entry.txt
            if [ -s changelog_entry.txt ]; then
              echo "changelog<<EOF" >> $GITHUB_OUTPUT
              cat changelog_entry.txt >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "changelog=Release $VERSION" >> $GITHUB_OUTPUT
            fi
          else
            echo "changelog=Release $VERSION" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          files: flat-artifacts/*
          prerelease: false
name: Release Binary Builds
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-*
permissions:
  contents: write
