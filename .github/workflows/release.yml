---
jobs:
  build:
    continue-on-error: true
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        name: Install Cross (for non-native targets)
        run: cargo install cross --git https://github.com/cross-rs/cross
      - if: matrix.target == 'x86_64-unknown-linux-gnu' || startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'windows')
        name: Build Release Binary (native)
        run: cargo build --release --target ${{ matrix.target }}
      - if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        name: Build Release Binary (cross)
        run: cross build --release --target ${{ matrix.target }}
      - name: Prepare Artifacts
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "artifacts/${{ matrix.asset_name }}.exe"
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "artifacts/${{ matrix.asset_name }}"
            chmod +x "artifacts/${{ matrix.asset_name }}"
          fi
        shell: bash
      - name: Create Binary Checksum
        run: |
          cd artifacts
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            certUtil -hashfile "${{ matrix.asset_name }}.exe" SHA256 | grep -v "SHA256 hash" | tr -d ' ' > "${{ matrix.asset_name }}.exe.sha256"
          else
            sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          fi
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: artifacts/
    strategy:
      matrix:
        include:
          # Linux x86_64 (Tier 1)
          - artifact_name: smt
            asset_name: smt-x86_64-linux-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux i686 (Tier 1)
          - artifact_name: smt
            asset_name: smt-i686-linux-gnu
            os: ubuntu-latest
            target: i686-unknown-linux-gnu
          # Linux ARM64 (Tier 2)
          - artifact_name: smt
            asset_name: smt-aarch64-linux-gnu
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # Linux x86_64 musl (Tier 2)
          - artifact_name: smt
            asset_name: smt-x86_64-linux-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          # Linux ARM64 musl (Tier 2)
          - artifact_name: smt
            asset_name: smt-aarch64-linux-musl
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          # macOS x86_64 (Tier 1)
          - artifact_name: smt
            asset_name: smt-x86_64-apple-darwin
            os: macos-13
            target: x86_64-apple-darwin
          # macOS ARM64 (Tier 1)
          - artifact_name: smt
            asset_name: smt-aarch64-apple-darwin
            os: macos-latest
            target: aarch64-apple-darwin
          # Windows x86_64 (Tier 1)
          - artifact_name: smt.exe
            asset_name: smt-x86_64-windows-msvc
            os: windows-latest
            target: x86_64-pc-windows-msvc
          # Windows ARM64 (Tier 2)
          - artifact_name: smt.exe
            asset_name: smt-aarch64-windows-msvc
            os: windows-latest
            target: aarch64-pc-windows-msvc
          # FreeBSD x86_64 (Tier 2)
          - artifact_name: smt
            asset_name: smt-x86_64-freebsd
            os: ubuntu-latest
            target: x86_64-unknown-freebsd
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Check for Required Builds
        run: |
          # Verify at least one x86_64 build per OS succeeded
          LINUX_X86_64=$(find release-artifacts -name "smt-x86_64-linux-gnu*" -type f 2>/dev/null | wc -l)
          MACOS_X86_64=$(find release-artifacts -name "smt-x86_64-apple-darwin*" -type f 2>/dev/null | wc -l)
          WINDOWS_X86_64=$(find release-artifacts -name "smt-x86_64-windows-msvc*" -type f 2>/dev/null | wc -l)
          echo "Linux x86_64 artifacts: $LINUX_X86_64"
          echo "macOS x86_64 artifacts: $MACOS_X86_64"
          echo "Windows x86_64 artifacts: $WINDOWS_X86_64"
          if [ "$LINUX_X86_64" -eq 0 ] || [ "$MACOS_X86_64" -eq 0 ] || [ "$WINDOWS_X86_64" -eq 0 ]; then
            echo "ERROR: Missing required x86_64 builds!"
            exit 1
          fi
        shell: bash
      - name: Flatten Artifacts Directory
        run: |
          mkdir -p flat-artifacts
          find release-artifacts -type f -exec cp {} flat-artifacts/ \;
          ls -lah flat-artifacts/
        shell: bash
      - id: changelog
        name: Get Changelog Entry
        run: |
          # Extract changelog for this version from CHANGELOG.md
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ -f "CHANGELOG.md" ]; then
            # Get content between this version and next version header
            awk "/^## \[${VERSION}\]/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md > changelog_entry.txt
            if [ -s changelog_entry.txt ]; then
              echo "changelog<<EOF" >> $GITHUB_OUTPUT
              cat changelog_entry.txt >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "changelog=Release $VERSION" >> $GITHUB_OUTPUT
            fi
          else
            echo "changelog=Release $VERSION" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          files: flat-artifacts/*
          prerelease: false
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Run Tests
        run: cargo test --all-features
      - if: matrix.rust == 'stable'
        name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - if: matrix.rust == 'stable'
        name: Check Formatting
        run: cargo fmt -- --check
    strategy:
      matrix:
        rust:
          - stable
          - nightly
name: Release Binary Builds
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-*
permissions:
  contents: write
