name: Release Binary Builds

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: smt
            asset_name: smt-x86_64-linux-gnu
          # Linux x86 (32-bit)
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            artifact_name: smt
            asset_name: smt-i686-linux-gnu
          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: smt
            asset_name: smt-aarch64-linux-gnu
          # Linux ARMv7 (32-bit ARM)
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact_name: smt
            asset_name: smt-armv7-linux-gnueabihf
          # Linux ARMv6 (Raspberry Pi)
          - os: ubuntu-latest
            target: arm-unknown-linux-gnueabihf
            artifact_name: smt
            asset_name: smt-arm-linux-gnueabihf
          # Linux PowerPC 64-bit (Big Endian)
          - os: ubuntu-latest
            target: powerpc64-unknown-linux-gnu
            artifact_name: smt
            asset_name: smt-powerpc64-linux-gnu
          # Linux PowerPC 64-bit (Little Endian)
          - os: ubuntu-latest
            target: powerpc64le-unknown-linux-gnu
            artifact_name: smt
            asset_name: smt-powerpc64le-linux-gnu
          # Linux RISC-V 64-bit
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            artifact_name: smt
            asset_name: smt-riscv64gc-linux-gnu
          # Linux s390x (IBM Z)
          - os: ubuntu-latest
            target: s390x-unknown-linux-gnu
            artifact_name: smt
            asset_name: smt-s390x-linux-gnu
          # macOS x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: smt
            asset_name: smt-x86_64-apple-darwin
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: smt
            asset_name: smt-aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: smt.exe
            asset_name: smt-x86_64-windows-msvc
          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: smt.exe
            asset_name: smt-aarch64-windows-msvc
          # FreeBSD x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            artifact_name: smt
            asset_name: smt-x86_64-freebsd
          # FreeBSD ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-freebsd
            artifact_name: smt
            asset_name: smt-aarch64-freebsd

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Install Cross (for non-native targets)
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Release Binary (native)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'windows')
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Release Binary (cross)
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "artifacts/${{ matrix.asset_name }}.exe"
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "artifacts/${{ matrix.asset_name }}"
            chmod +x "artifacts/${{ matrix.asset_name }}"
          fi

      - name: Create Binary Checksum
        shell: bash
        run: |
          cd artifacts
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            certUtil -hashfile "${{ matrix.asset_name }}.exe" SHA256 | grep -v "SHA256 hash" | tr -d ' ' > "${{ matrix.asset_name }}.exe.sha256"
          else
            sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: artifacts/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten Artifacts Directory
        shell: bash
        run: |
          mkdir -p flat-artifacts
          find release-artifacts -type f -exec cp {} flat-artifacts/ \;
          ls -lah flat-artifacts/

      - name: Get Changelog Entry
        id: changelog
        shell: bash
        run: |
          # Extract changelog for this version from CHANGELOG.md
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ -f "CHANGELOG.md" ]; then
            # Get content between this version and next version header
            awk "/^## \[${VERSION}\]/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md > changelog_entry.txt
            if [ -s changelog_entry.txt ]; then
              echo "changelog<<EOF" >> $GITHUB_OUTPUT
              cat changelog_entry.txt >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "changelog=Release $VERSION" >> $GITHUB_OUTPUT
            fi
          else
            echo "changelog=Release $VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: flat-artifacts/*
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test --all-features

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        if: matrix.rust == 'stable'

      - name: Check Formatting
        run: cargo fmt -- --check
        if: matrix.rust == 'stable'
